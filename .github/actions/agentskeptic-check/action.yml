# Thin composite wrapper over `npx agentskeptic check|enforce` — no second verifier.
# Ships with run-action.sh and outcome-ci-surface.mjs; safe for
# `uses: org/repo/.github/actions/agentskeptic-check@ref`.
#
# Permissions: requires only `permissions: contents: read`. The artifact upload
# step uses actions/upload-artifact@v4 which authenticates via ACTIONS_RUNTIME_TOKEN
# (provided automatically to all actions) and does NOT require GITHUB_TOKEN scopes
# such as `actions: write`. See docs/ambient-ci-distribution.md.
#
# GHES note: actions/upload-artifact@v4+ is unsupported on GitHub Enterprise Server.
# Non-GHES runners get the full artifact behavior; GHES runners gracefully skip
# the upload step (verification verdict and outputs are unaffected).
name: "AgentSkeptic verification"
description: "Run AgentSkeptic CLI check or enforce — capture stdout/stderr, optionally fail on verdict thresholds"
inputs:
  workflow-id:
    description: Workflow identifier to verify.
    required: true
  project:
    description: >-
      Project root for conventional layout; uses <root>/agentskeptic/tools.json and events.ndjson when set.
      When set, omit events and registry. When empty, pass both events and registry explicitly.
    required: false
    default: ""
  events:
    description: Path to NDJSON event observations (required when project is empty).
    required: false
    default: ""
  registry:
    description: Path to tools registry JSON (required when project is empty).
    required: false
    default: ""
  db:
    description: Path to database or verification state store used by the CLI.
    required: false
    default: ""
  mode:
    description: 'Verification mode. Use "check" for stateless truth check or "enforce" for commercial/stateful enforcement.'
    required: false
    default: "check"
  fail-on:
    description: 'Verdict threshold for failing the job. Supported initially: not_trusted_or_unknown, not_trusted, never.'
    required: false
    default: "not_trusted_or_unknown"
  package:
    description: >-
      npm package spec for npx (e.g. agentskeptic@latest for demos, agentskeptic@1.2.3 for release gates).
      Default floats latest; pinned versions are required for branch-protection gates (see docs/ambient-ci-distribution.md).
    required: false
    default: "agentskeptic@latest"
  share-report-origin:
    description: Optional hosted report origin for check-mode shareable reports (https origin only — see CLI docs).
    required: false
    default: ""
  extra-args:
    description: Additional CLI arguments appended to the command (shell word-splitting).
    required: false
    default: ""

outputs:
  verdict:
    description: Parsed truth_check_verdict value (trusted|not_trusted|unknown) if present; otherwise empty.
    value: ${{ steps.agentskeptic.outputs.verdict }}
  state-relation:
    description: 'Outcome Certificate stateRelation: matches_expectations | does_not_match | not_established. Empty when stdout did not parse as Outcome Certificate v3.'
    value: ${{ steps.agentskeptic.outputs.state-relation }}
  trust-decision:
    description: 'failureSpine.trustDecision: safe | unsafe | unknown. Empty for non-certificate runs.'
    value: ${{ steps.agentskeptic.outputs.trust-decision }}
  failing-tool-ids:
    description: Comma-separated, sorted, unique tool IDs of failing steps. Empty for trusted or non-certificate runs.
    value: ${{ steps.agentskeptic.outputs.failing-tool-ids }}
  primary-reason-codes:
    description: Comma-separated failureSpine.primaryCodes (cap 24, sorted unique). Empty for non-certificate runs.
    value: ${{ steps.agentskeptic.outputs.primary-reason-codes }}
  failing-witness-kinds:
    description: 'Comma-separated witness kinds derived from reason-code prefixes (sql, http_witness, object_storage, vector_document, mongo_document, state_witness). Empty for trusted or non-certificate runs.'
    value: ${{ steps.agentskeptic.outputs.failing-witness-kinds }}
  recommended-action:
    description: failureSpine.actionableFailure.recommendedAction (e.g. manual_review, reconcile_downstream_state). Empty for non-certificate runs.
    value: ${{ steps.agentskeptic.outputs.recommended-action }}
  automation-safe:
    description: '"true" or "false" — failureSpine.actionableFailure.automationSafe. Empty for non-certificate runs.'
    value: ${{ steps.agentskeptic.outputs.automation-safe }}
  certificate-path:
    description: Absolute path to outcome-certificate.json on the runner. Empty when stdout did not parse as Outcome Certificate v3.
    value: ${{ steps.agentskeptic.outputs.certificate-path }}
  stdout-path:
    description: Path to the captured Outcome Certificate stdout file.
    value: ${{ steps.agentskeptic.outputs.stdout-path }}
  stderr-path:
    description: Path to the captured stderr/human report file.
    value: ${{ steps.agentskeptic.outputs.stderr-path }}
  exit-code:
    description: Raw CLI exit code.
    value: ${{ steps.agentskeptic.outputs.exit-code }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      env:
        NODE_OPTIONS: "--disable-warning=DEP0040"
      with:
        node-version: "22"

    - id: agentskeptic
      shell: bash
      env:
        INPUT_WORKFLOW_ID: ${{ inputs.workflow-id }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_EVENTS: ${{ inputs.events }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_DB: ${{ inputs.db }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_PACKAGE: ${{ inputs.package }}
        INPUT_SHARE_REPORT_ORIGIN: ${{ inputs.share-report-origin }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: bash "$GITHUB_ACTION_PATH/run-action.sh"

    # Upload the canonical Outcome Certificate as a downloadable artifact so any
    # reviewer can pull `outcome-certificate.json` from the run's Artifacts list
    # without parsing logs. `if-no-files-found: ignore` makes this a graceful
    # no-op when stdout did not parse as Outcome Certificate v3 (the renderer
    # only writes the file on a successful parse).
    - name: Upload Outcome Certificate
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: agentskeptic-outcome-certificate
        path: ${{ runner.temp }}/agentskeptic-ci/outcome-certificate.json
        if-no-files-found: ignore
        retention-days: 14
