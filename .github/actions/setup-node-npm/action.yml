# Setup Node 22, npm cache, and npm ci at the repository root. Does not run checkout
# (keeps CodeQL and other jobs free to run grep/validation before or after install).
# package.json `engines.node` is `22.x || 24.x`; CI pins Node 22 for reproducibility.
name: "Setup Node + npm ci"
description: "Node 22 (LTS), npm cache, and npm ci (no checkout; compose after actions/checkout in workflows)"
runs:
  using: "composite"
  steps:
    # npm/setup-node still touch code paths that load Node's legacy `punycode` (DEP0040).
    # Suppress only that code so other deprecations remain visible.
    - uses: actions/setup-node@v5
      env:
        NODE_OPTIONS: "--disable-warning=DEP0040"
      with:
        node-version: "22"
        cache: npm
    # drizzle-kit still pulls deprecated @esbuild-kit/* (registry metadata); harmless until Drizzle drops it.
    # loglevel=error hides only npm WARN lines (including transitive deprecations), not install errors.
    - run: npm ci
      shell: bash
      env:
        NODE_OPTIONS: "--disable-warning=DEP0040"
        npm_config_loglevel: "error"
