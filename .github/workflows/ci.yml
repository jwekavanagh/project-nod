name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-npm
      - name: CodeQL remediation grep invariants
        shell: bash
        run: |
          set -euo pipefail
          if grep -Fq 'includes("https://' src/commercial/licensePreflight.test.ts test/redaction-rules.test.mjs; then echo "Invariant fail: https includes"; exit 1; fi
          if grep -Fq 'includes("example.com' test/redaction-rules.test.mjs; then echo "Invariant fail: example.com includes"; exit 1; fi
          lines=$(grep -cF 'json(res, 500' src/debugServer.ts || echo 0)
          if [ "$lines" -ne 1 ]; then echo "Invariant fail: json(res,500 line count=$lines expected 1"; exit 1; fi
          if grep -Eq '\bdetails\b' src/debugServer.ts; then echo "Invariant fail: details in debugServer"; exit 1; fi
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      # Avoid uploading SARIF when repo default CodeQL setup is enabled (GitHub rejects mixed submissions).
      - uses: github/codeql-action/analyze@v4
        id: codeql_analyze
        with:
          upload: never
      - name: Assert SARIF has no results for remediation rule IDs
        run: node scripts/assert-codeql-remediation-sarif.mjs "${{ steps.codeql_analyze.outputs['sarif-output'] }}"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
      POSTGRES_VERIFICATION_URL: postgresql://verifier_ro:verifier@localhost:5432/postgres
      AGENTSKEPTIC_TELEMETRY: "0"
      # Root `test:ci` does not use website DATABASE_URL / TELEMETRY_DATABASE_URL; keep split off so Vitest defaults match “core-only” unless a test stubs otherwise.
      AGENTSKEPTIC_TELEMETRY_WRITES_TELEMETRY_DB: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Assert workflow Postgres URLs use localhost only (static scan)
        run: node scripts/assert-ci-workflows-database-url-hosts.mjs
      - uses: ./.github/actions/setup-node-npm
      - name: Epistemic contract structure (sync + validate)
        run: node scripts/sync-epistemic-contract-website.mjs && node scripts/validate-epistemic-contract-structure.mjs
      - name: Install LangGraph Node oracle fixture dependencies
        run: npm ci --prefix test/fixtures/langgraph-node-oracle
      - name: Build, tests, and adoption chain (CI / Postgres)
        run: npm run test:ci

  commercial:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # Fixture Postgres on the job `services.postgres` container — not production. Separate DB names
    # exercise core vs telemetry routing the same way as split-store production, without remote hosts.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_website
      TELEMETRY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_telemetry
      AGENTSKEPTIC_TELEMETRY_WRITES_TELEMETRY_DB: "1"
      AUTH_SECRET: ci_auth_secret_value_at_least_32_chars_ok
      CONTACT_SALES_EMAIL: sales-ci@example.com
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRICE_INDIVIDUAL: price_ci_individual
      STRIPE_PRICE_INDIVIDUAL_YEARLY: price_ci_individual_y
      STRIPE_PRICE_TEAM: price_ci_team
      STRIPE_PRICE_TEAM_YEARLY: price_ci_team_y
      STRIPE_PRICE_BUSINESS: price_ci_business
      STRIPE_PRICE_BUSINESS_YEARLY: price_ci_business_y
      STRIPE_OVERAGE_INDIVIDUAL: price_ci_ov_i
      STRIPE_OVERAGE_TEAM: price_ci_ov_t
      STRIPE_OVERAGE_BUSINESS: price_ci_ov_b
      CRON_SECRET: ci_cron_secret_placeholder_32chars_min
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Assert workflow Postgres URLs use localhost only (static scan)
        run: node scripts/assert-ci-workflows-database-url-hosts.mjs
      - name: Assert job env Postgres URLs are localhost (runtime; requires core + telemetry)
        run: node scripts/assert-ci-postgres-env-safety.mjs --require-core-and-telemetry
      - uses: ./.github/actions/setup-node-npm
      - name: Create website and telemetry databases
        run: node scripts/ci-create-website-telemetry-dbs.mjs
      - name: Validate commercial layer
        run: npm run validate-commercial
      - name: Install Playwright Chromium (website holistic gate)
        run: npx playwright install chromium
      - name: Verify web marketing copy contract
        run: npm run verify:web-marketing-copy

  # After CodeQL, core tests, and commercial gates are green, promote to Vercel production.
  # `website/vercel.json` disables auto-deploys for `main` so a push alone does not ship.
  vercel_production:
    name: Vercel production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [codeql, test, commercial]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Same defaults as a Vercel cloud build (see website/next.config.ts outputFileTracingRoot).
    env:
      VERCEL: "1"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-npm
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel env (production)
        working-directory: website
        run: vercel pull --yes --environment=production
      - name: Build prebuilt output
        working-directory: website
        run: vercel build --prod
      - name: Deploy prebuilt to production
        working-directory: website
        run: vercel deploy --prebuilt --prod
