# Unified gate: PRs and normal pushes run the heavy jobs below. Lightweight path runs for semantic-release churn
# (`chore(release):` pushes to main) and for SemVer `v*` tags so we do not run Postgres/Docker/replay/Python again
# on metadata-only deltas. Tag wheel publication uses `release-package.yml` instead of tying PyPI to this workflow.
#
# No path filters on the main workload — schemas, docs, website, CLI, commercial, and release tooling interact.
name: CI

on: [push, pull_request]

# deployments: write — reusable deploy-vercel.yml reports successful `vercel --prod` to the GitHub
# Deployments / Environments API. Without it, only the Vercel Git integration updates those views.
permissions:
  contents: read
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci_scope:
    name: CI scope
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.pick.outputs.mode }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        env:
          NODE_OPTIONS: "--disable-warning=DEP0040"
        with:
          node-version: "22"
      - id: pick
        run: node scripts/ci-scope-light.mjs

  commitlint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-npm
      - name: commitlint
        run: node node_modules/@commitlint/cli/cli.js --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  codeql:
    name: CodeQL (javascript-typescript)
    needs: [ci_scope]
    if: needs.ci_scope.outputs.mode == 'full'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-npm
      - name: CodeQL remediation grep invariants
        shell: bash
        run: |
          set -euo pipefail
          if grep -Fq 'includes("https://' src/commercial/licensePreflight.test.ts test/redaction-rules.test.mjs; then echo "Invariant fail: https includes"; exit 1; fi
          if grep -Fq 'includes("example.com' test/redaction-rules.test.mjs; then echo "Invariant fail: example.com includes"; exit 1; fi
          lines=$(grep -cF 'json(res, 500' src/debugServer.ts || echo 0)
          if [ "$lines" -ne 1 ]; then echo "Invariant fail: json(res,500 line count=$lines expected 1"; exit 1; fi
          if grep -Eq '\bdetails\b' src/debugServer.ts; then echo "Invariant fail: details in debugServer"; exit 1; fi
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      # Avoid uploading SARIF when repo default CodeQL setup is enabled (GitHub rejects mixed submissions).
      - uses: github/codeql-action/analyze@v4
        id: codeql_analyze
        with:
          upload: never
      - name: Assert SARIF has no results for remediation rule IDs
        run: node scripts/assert-codeql-remediation-sarif.mjs "${{ steps.codeql_analyze.outputs['sarif-output'] }}"

  verification:
    name: verification
    needs: [ci_scope]
    if: needs.ci_scope.outputs.mode == 'full'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
      POSTGRES_VERIFICATION_URL: postgresql://verifier_ro:verifier@localhost:5432/postgres
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_website
      TELEMETRY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_telemetry
      AGENTSKEPTIC_TELEMETRY: "0"
      AGENTSKEPTIC_TELEMETRY_WRITES_TELEMETRY_DB: "0"
      AUTH_SECRET: ci_auth_secret_value_at_least_32_chars_ok
      CONTACT_SALES_EMAIL: sales-ci@example.com
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRICE_INDIVIDUAL: price_ci_individual
      STRIPE_PRICE_INDIVIDUAL_YEARLY: price_ci_individual_y
      STRIPE_PRICE_TEAM: price_ci_team
      STRIPE_PRICE_TEAM_YEARLY: price_ci_team_y
      STRIPE_PRICE_BUSINESS: price_ci_business
      STRIPE_PRICE_BUSINESS_YEARLY: price_ci_business_y
      STRIPE_OVERAGE_INDIVIDUAL: price_ci_ov_i
      STRIPE_OVERAGE_TEAM: price_ci_ov_t
      STRIPE_OVERAGE_BUSINESS: price_ci_ov_b
      CRON_SECRET: ci_cron_secret_placeholder_32chars_min
    steps:
      - uses: actions/checkout@v5
      - name: Assert workflow Postgres URLs use localhost only (static scan)
        run: node scripts/assert-ci-workflows-database-url-hosts.mjs
      - name: Assert job env Postgres URLs are localhost (runtime; requires core + telemetry)
        run: node scripts/assert-ci-postgres-env-safety.mjs --require-core-and-telemetry
      - uses: ./.github/actions/setup-node-npm
      - name: Install LangGraph Node oracle fixture dependencies
        run: npm ci --prefix test/fixtures/langgraph-node-oracle
      - name: Verification truth
        run: npm run verification:truth

  replay_verification_truth:
    name: Replay verification truth (Docker)
    needs: [ci_scope]
    if: needs.ci_scope.outputs.mode == 'full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Replay merge gate via compose (cold repro)
        run: npm run replay:verification

  release-preview:
    name: Release preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-npm
      - name: Release preview (squash message vs allowlist)
        run: node scripts/release-preview.mjs --event "$GITHUB_EVENT_PATH"

  python:
    name: Python
    needs: [ci_scope]
    if: needs.ci_scope.outputs.mode == 'full'
    runs-on: ubuntu-latest
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Python test suite conductor
        env:
          AGENTSKEPTIC_POSTGRES_LCT_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: npm run test:python
      - name: Timed parity smoke
        env:
          TIMED_VERIFY_BUDGET_S: "900"
        run: cd python && python scripts/timed_first_verify.py
      - name: Build python image (Dockerfile timed verify)
        run: docker build -f python/Dockerfile -t agentskeptic-py-verify .

  product_gate:
    name: Product gate (full CI or release metadata)
    runs-on: ubuntu-latest
    needs: [ci_scope, codeql, verification, replay_verification_truth, python]
    if: always() && needs.ci_scope.result == 'success'
    steps:
      - name: Assert heavy jobs succeeded (full CI)
        if: needs.ci_scope.outputs.mode == 'full'
        env:
          R_CODEQL: ${{ needs.codeql.result }}
          R_VERIFICATION: ${{ needs.verification.result }}
          R_REPLAY: ${{ needs.replay_verification_truth.result }}
          R_PYTHON: ${{ needs.python.result }}
        shell: bash
        run: |
          set -euo pipefail
          for kv in "codeql:${R_CODEQL}" "verification:${R_VERIFICATION}" "replay:${R_REPLAY}" "python:${R_PYTHON}"; do
            name="${kv%%:*}"
            status="${kv#*:}"
            if [[ "${status}" != "success" ]]; then
              echo "::error title=Full CI incomplete::job ${name} conclusion=${status} (expected success)"
              exit 1
            fi
          done
          echo "Full CI gate satisfied."

      - uses: actions/checkout@v5
        if: needs.ci_scope.outputs.mode == 'light'

      - name: Assert workflow Postgres URLs use localhost only (static scan)
        if: needs.ci_scope.outputs.mode == 'light'
        run: node scripts/assert-ci-workflows-database-url-hosts.mjs

      - uses: ./.github/actions/setup-node-npm
        if: needs.ci_scope.outputs.mode == 'light' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

      - name: Metadata smoke — main chore(release)
        if: needs.ci_scope.outputs.mode == 'light' && github.ref == 'refs/heads/main'
        env:
          NODE_OPTIONS: "--disable-warning=DEP0040"
          npm_config_loglevel: "error"
        run: npm run build

      - name: Metadata smoke — SemVer tags
        if: needs.ci_scope.outputs.mode == 'light' && startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/assert-root-version-tags-ref.mjs

      - uses: actions/setup-python@v6
        if: needs.ci_scope.outputs.mode == 'light' && startsWith(github.ref, 'refs/tags/v')
        with:
          python-version: "3.12"

      - name: Python wheel twine check (tags)
        if: needs.ci_scope.outputs.mode == 'light' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -e
          cd python && python -m pip install build twine -q && python -m build && python -m twine check dist/*

  # After the product gate passes, promote to Vercel production (GHA only; Vercel Git deploy for main is off).
  vercel_production:
    name: Vercel production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [product_gate]
    uses: ./.github/workflows/deploy-vercel.yml
    secrets: inherit
