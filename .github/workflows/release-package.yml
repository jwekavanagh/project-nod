# Publish the Python wheel to PyPI after a SemVer tag push. Lightweight by design: semantic-release runs
# only after full CI on `main`; npm/GitHub Releases use that path. Trusted Publishing on PyPI must list
# this workflow file (`release-package.yml`), not full `ci.yml`, as an allowed publisher alongside the npm path.
#
# See CONTRIBUTING → GitHub Actions (operator) for the full shipping story.

name: Release package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: PyPI wheel (Trusted Publishing)
    runs-on: ubuntu-latest
    # Must match GitHub environment set on the Trusted Publisher in PyPI (OIDC `environment` claim).
    # If PyPI uses a different name (e.g. `release`), change this to match.
    environment:
      name: pypi
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - name: Tag path diagnostics
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          {
            echo '### release-package: tag push → PyPI'
            echo "- **ref_name**: ${REF_NAME}"
            echo "- **sha**: ${SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Assert SemVer 2.0.0 v-tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          re='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+)(\.[0-9A-Za-z-]+)*)?(\+([0-9A-Za-z-]+)(\.[0-9A-Za-z-]+)*)?$'
          [[ "$TAG" =~ $re ]]

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          set -e
          cd python && python -m pip install build -q && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

      - name: Verify distribution
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export EXPECTED_VERSION="${HEAD_BRANCH#v}"
          node scripts/verify-release-distribution.mjs
