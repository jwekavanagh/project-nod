# When full CI is skipped (paths-ignore includes website/**), this workflow still runs the
# website trust gates (commercial validate + marketing copy / Vitest / Playwright / LHCI) and
# deploys production on main when the push is website-only.
name: Website

on:
  push:
    paths:
      - "website/**"
  pull_request:
    paths:
      - "website/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # If this PR/push also touches non-website paths, full ci.yml runs the same gates; skip here to avoid double work.
  scope:
    name: Change scope
    runs-on: ubuntu-latest
    outputs:
      website_only: ${{ steps.pick.outputs.website_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            from="${{ github.event.pull_request.base.sha }}"
            to="${{ github.event.pull_request.head.sha }}"
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              echo "website_only=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            from="${{ github.event.before }}"
            to="${{ github.event.after }}"
          fi
          mapfile -t files < <(git diff --name-only "$from" "$to" || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "website_only=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for f in "${files[@]}"; do
            case "$f" in
              website/*) ;;
              *) echo "website_only=false" >> "$GITHUB_OUTPUT"
                 exit 0
                 ;;
            esac
          done
          echo "website_only=true" >> "$GITHUB_OUTPUT"

  # Lighter than full ci.yml: no CodeQL, no core package tests / adoption chain.
  gates:
    name: Website commercial + marketing gates
    if: needs.scope.outputs.website_only == 'true'
    needs: [scope]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_website
      TELEMETRY_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wfv_telemetry
      AGENTSKEPTIC_TELEMETRY_WRITES_TELEMETRY_DB: "1"
      AUTH_SECRET: ci_auth_secret_value_at_least_32_chars_ok
      CONTACT_SALES_EMAIL: sales-ci@example.com
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRICE_INDIVIDUAL: price_ci_individual
      STRIPE_PRICE_INDIVIDUAL_YEARLY: price_ci_individual_y
      STRIPE_PRICE_TEAM: price_ci_team
      STRIPE_PRICE_TEAM_YEARLY: price_ci_team_y
      STRIPE_PRICE_BUSINESS: price_ci_business
      STRIPE_PRICE_BUSINESS_YEARLY: price_ci_business_y
      STRIPE_OVERAGE_INDIVIDUAL: price_ci_ov_i
      STRIPE_OVERAGE_TEAM: price_ci_ov_t
      STRIPE_OVERAGE_BUSINESS: price_ci_ov_b
      CRON_SECRET: ci_cron_secret_placeholder_32chars_min
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - uses: actions/checkout@v6
      - name: Assert workflow Postgres URLs use localhost only (static scan)
        run: node scripts/assert-ci-workflows-database-url-hosts.mjs
      - name: Assert job env Postgres URLs are localhost (runtime; requires core + telemetry)
        run: node scripts/assert-ci-postgres-env-safety.mjs --require-core-and-telemetry
      - uses: ./.github/actions/setup-node-npm
      - name: Create website and telemetry databases
        run: node scripts/ci-create-website-telemetry-dbs.mjs
      - name: Verify web docs claim URLs
        run: npm run check:docs-claim-urls --prefix website
      - name: Validate commercial layer
        run: npm run validate-commercial
      - name: Install Playwright Chromium (website holistic gate)
        run: npx playwright install chromium
      - name: Verify web marketing copy contract
        run: npm run verify:web-marketing-copy

  # If this push also changes non-website paths, full CI runs and its vercel job deploys — skip here.
  # Does not `need: gates` so a mixed `main` push (gates skipped) still computes `only_website` for the deploy job.
  should_publish_vercel:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [scope]
    runs-on: ubuntu-latest
    outputs:
      only_website: ${{ steps.check.outputs.only_website }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "only_website=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t files < <(git diff --name-only "${{ github.event.before }}" "${{ github.event.after }}")
          if [ "${#files[@]}" -eq 0 ]; then
            echo "only_website=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for f in "${files[@]}"; do
            case "$f" in
              website/*) ;;
              *) echo "only_website=false" >> "$GITHUB_OUTPUT"
                 exit 0
                 ;;
            esac
          done
          echo "only_website=true" >> "$GITHUB_OUTPUT"

  # When main changes are website-only, full ci.yml (including Vercel) is skipped; deploy here.
  vercel_production:
    name: Vercel production
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.should_publish_vercel.outputs.only_website == 'true'
    needs: [scope, gates, should_publish_vercel]
    uses: ./.github/workflows/deploy-vercel.yml
    with:
      agentskeptic_telemetry_zero: true
    secrets: inherit
