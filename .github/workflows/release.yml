# See CONTRIBUTING.md → GitHub Actions (operator) → Releases (canonical).
# Concurrency: one at a time (queue) so rapid main merges and tag-CI back-to-back runs cannot
# interleave git pushes, tags, or PyPI with parallel semantic-release jobs.
name: Release

on:
  # PyPI Trusted Publishing runs from `release-package.yml` on tag push; this file keeps semantic-release.
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run semantic-release --dry-run only (no version bump, tag, or publish)"
        type: boolean
        default: true
      full_run:
        description: "If true and dry_run is false, run the full release on the default branch (sparingly; normal path is after CI on main via workflow_run)"
        type: boolean
        default: false

# Opt in per job; default token has no write scopes.
permissions: {}

concurrency:
  group: release-mutations
  cancel-in-progress: false

jobs:
  semantic-release:
    name: semantic-release
    if: |
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == 'main' &&
        !startsWith(format('{0}', github.event.workflow_run.display_title), 'chore(release):')) ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.dry_run == true || (inputs.dry_run == false && inputs.full_run == true)))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          ref: "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}"
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v5
        env:
          NODE_OPTIONS: "--disable-warning=DEP0040"
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        env:
          NODE_OPTIONS: "--disable-warning=DEP0040"
          npm_config_loglevel: "error"
        run: npm ci

      - name: Upgrade npm (Trusted Publishing / provenance; matches commercial manual workflow)
        run: npm install -g npm@11.5.1

      - name: Dry-run (no version bump, tag, or publish)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        shell: bash
        run: |
          set +e
          npx --no -- semantic-release --dry-run 2>&1 | tee semantic-release.log
          sr_exit=${PIPESTATUS[0]}
          set -e
          node scripts/release-outcome-summarize.mjs --log semantic-release.log --exit-code "$sr_exit"
          exit "$sr_exit"

      - name: Assert commercial license base URL
        if: |
          (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && inputs.full_run == true)
        env:
          COMMERCIAL_BASE: ${{ vars.COMMERCIAL_LICENSE_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${COMMERCIAL_BASE// }" ]; then
            echo "Set repository variable COMMERCIAL_LICENSE_API_BASE_URL (production app origin, no trailing slash)."
            exit 1
          fi

      - name: Live contract manifest URL parity (blocks publish)
        if: |
          (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && inputs.full_run == true)
        run: node scripts/assert-public-contract-url.mjs

      - name: Full semantic-release
        if: |
          (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && inputs.full_run == true)
        env:
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ vars.COMMERCIAL_LICENSE_API_BASE_URL }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set +e
          npx --no -- semantic-release 2>&1 | tee semantic-release.log
          sr_exit=${PIPESTATUS[0]}
          set -e
          node scripts/release-outcome-summarize.mjs --log semantic-release.log --exit-code "$sr_exit"
          exit "$sr_exit"
