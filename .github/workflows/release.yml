# After CI succeeds, npm (semantic-release) and PyPI run on the same head_sha CI used.
# No push-to-main trigger — release is never parallel with the triggering CI.
# See CONTRIBUTING.md (GitHub Actions / releases).
name: Release

on:
  # Path filters on the CI workflow do not apply to tag pushes; v* tag CI always runs.
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run semantic-release --dry-run only (no version bump, tag, or publish)"
        type: boolean
        default: true
      full_run:
        description: "If true and dry_run is false, run the full release on the default branch (sparingly; normal path is after CI on main via workflow_run)"
        type: boolean
        default: false

# Opt in per job; default token has no write scopes.
permissions: {}

concurrency:
  group: "rel-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.run_id }}"
  cancel-in-progress: false

jobs:
  semantic-release:
    name: semantic-release
    if: |
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.dry_run == true || (inputs.dry_run == false && inputs.full_run == true)))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          ref: "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}"
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.SEMANTIC_RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Upgrade npm (Trusted Publishing / provenance; matches commercial manual workflow)
        run: npm install -g npm@11.5.1

      - name: Dry-run (no version bump, tag, or publish)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: npx --no -- semantic-release --dry-run

      - name: Assert commercial license base URL
        if: |
          (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && inputs.full_run == true)
        env:
          COMMERCIAL_BASE: ${{ vars.COMMERCIAL_LICENSE_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${COMMERCIAL_BASE// }" ]; then
            echo "Set repository variable COMMERCIAL_LICENSE_API_BASE_URL (production app origin, no trailing slash)."
            exit 1
          fi

      - name: Full semantic-release
        if: |
          (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && inputs.full_run == true)
        env:
          WF_BUILD_PROFILE: commercial
          COMMERCIAL_LICENSE_API_BASE_URL: ${{ vars.COMMERCIAL_LICENSE_API_BASE_URL }}
        run: npx --no -- semantic-release

  # PyPI: after tag CI. Job if uses only GHA built-ins; first step enforces SemVer 2.0.0 (v*).
  publish-pypi:
    name: Publish PyPI
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'v') &&
      !contains(github.event.workflow_run.head_branch, '/') &&
      contains(github.event.workflow_run.head_branch, '.')
    runs-on: ubuntu-latest
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Assert SemVer 2.0.0 v-tag (head_branch is short tag name for tag push)
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          re='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+)(\.[0-9A-Za-z-]+)*)?(\+([0-9A-Za-z-]+)(\.[0-9A-Za-z-]+)*)?$'
          [[ "$TAG" =~ $re ]]

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          set -e
          cd python && python -m pip install build -q && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
