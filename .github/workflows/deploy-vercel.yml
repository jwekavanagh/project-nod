# Reusable: production Vercel deploy (remote build). Call from CI only.
# `website/vercel.json` disables auto-deploys for `main` so a push alone does not ship.
name: Deploy Vercel production

on:
  workflow_call:
    inputs:
      agentskeptic_telemetry_zero:
        description: "Export AGENTSKEPTIC_TELEMETRY=0 (website-only main deploy path)"
        type: boolean
        default: false
    secrets:
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROJECT_ID:
        required: true
      VERCEL_TOKEN:
        required: true

# deployments: create GitHub deployment records (Vercel CLI does not, unlike the Vercel Git app).
permissions:
  contents: read
  deployments: write

jobs:
  vercel:
    name: Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Telemetry env (callers that require AGENTSKEPTIC_TELEMETRY=0)
        if: inputs.agentskeptic_telemetry_zero
        run: echo "AGENTSKEPTIC_TELEMETRY=0" >> "$GITHUB_ENV"
      - uses: ./.github/actions/setup-node-npm
      # Build runs on Vercel (not on this runner). `vercel build` in GHA can fail with
      # `spawn sh ENOENT` when running the project Install Command (e.g. `npm install --prefix ..`) locally.
      # Run from repo root without `--cwd website`: the linked Vercel project's Root Directory is `website`
      # in Project Settings; adding `--cwd website` would resolve to `website/website` and fail.
      - name: Deploy to Vercel (production, remote build)
        run: npx -y vercel@52 deploy --prod --yes --logs
      - name: Register production with GitHub Deployments API
        if: success()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # The Vercel GitHub app posts to Deployments/Environments for Git-based builds. `vercel deploy --prod`
          # in CI does not, so the repository Deployments view stays empty for those ships unless we record them.
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          node -e "const fs=require('fs'); const ref=process.argv[1]; fs.writeFileSync('/tmp/deployment.json', JSON.stringify({ref, environment:'production', auto_merge:false, required_contexts:[], description:'Vercel: vercel deploy --prod (GHA; main has git.deploymentEnabled off)'}));" "${{ github.sha }}"
          DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments" -X POST --input /tmp/deployment.json -q .id)
          node -e "const fs=require('fs'); const u=process.argv[1]; fs.writeFileSync('/tmp/deployment_status.json', JSON.stringify({ state:'success', environment_url:'https://agentskeptic.com', log_url:u, auto_inactive:true }));" "$run_url"
          gh api "repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses" -X POST --input /tmp/deployment_status.json
          rm -f /tmp/deployment.json /tmp/deployment_status.json
