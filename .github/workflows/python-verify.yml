# Python package: in-process kernel tests, subprocess guard, timed parity smoke.
name: Python verify

on:
  pull_request:
    paths:
      - "python/**"
      - "schemas/**"
      - "examples/python-verification/**"
      - "docs/integrator-verification.md"
      - "scripts/check-python-no-subprocess.mjs"
      - "scripts/assert-python-langgraph-primacy.mjs"
      - "scripts/regen-langgraph-embeds.mjs"
      - "website/src/content/embeddedReports/langgraph-lct-*.v1.json"
      - ".github/workflows/python-verify.yml"
  push:
    branches: [main]
    paths:
      - "python/**"
      - "schemas/**"
      - "examples/python-verification/**"
      - "docs/integrator-verification.md"
      - "scripts/check-python-no-subprocess.mjs"
      - "scripts/assert-python-langgraph-primacy.mjs"
      - "scripts/regen-langgraph-embeds.mjs"
      - "website/src/content/embeddedReports/langgraph-lct-*.v1.json"
      - ".github/workflows/python-verify.yml"

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AGENTSKEPTIC_POSTGRES_LCT_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Guardrails
        run: node scripts/check-python-no-subprocess.mjs && node scripts/assert-python-langgraph-primacy.mjs
      - name: Pytest
        run: cd python && python -m pip install -e ".[dev,postgres]" && python -m pytest tests/ -q
      - name: Timed parity smoke
        env:
          TIMED_VERIFY_BUDGET_S: "900"
        run: cd python && python scripts/timed_first_verify.py
      - name: Cross-runtime conformance parity gates
        run: npm run conformance:all && npm run conformance:gate && node conformance/assert-bigquery-excluded.mjs

  docker-timed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build python image (runs timed_first_verify in Dockerfile)
        run: docker build -f python/Dockerfile -t agentskeptic-py-verify .
