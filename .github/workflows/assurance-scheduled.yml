name: Assurance scheduled

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  assurance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build and assurance run
        run: npm run build && node dist/cli.js assurance run --manifest examples/assurance/manifest.json
