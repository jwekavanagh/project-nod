name: Assurance scheduled

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: assurance-scheduled
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  assurance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-npm
      - name: Build and assurance run
        run: npm run build && node dist/cli.js assurance run --manifest examples/assurance/manifest.json
