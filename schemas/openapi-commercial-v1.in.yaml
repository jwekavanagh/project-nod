openapi: "3.0.3"
info:
  title: AgentSkeptic commercial license API
  version: __PRODUCT_VERSION__
  contact:
    url: __DISTRIBUTION_CONTACT_URL__
  x-agentskeptic-distribution:
    repository: __DISTRIBUTION_REPO_URL__
    npmPackage: __DISTRIBUTION_NPM_URL__
    openApi: __OPENAPI_SELF_URL__
  x-agentskeptic-contract:
    url: __CONTRACT_URL__
    version: __CONTRACT_VERSION__
    manifestSha256: __CONTRACT_SHA__
  description: "__IDENTITY_ONE_LINER__\n\nMachine-readable contract for license preflight used by the published npm CLI.\nBase URL is your deployed app origin (same as NEXT_PUBLIC_APP_URL).\n\nEvery path in this document returns an `x-request-id` response header on all status codes (echo a valid client `x-request-id` when supplied; otherwise server-generated). Non-2xx JSON bodies follow RFC 7807-style Problem Details (`type`, `title`, `status`, `detail`, optional `code`, `instance`) unless noted; `POST /api/v1/usage/reserve` denials additionally include legacy `allowed`, `code`, `message`, and optional `upgrade_url` for backward compatibility.\n"
externalDocs:
  description: "First-run integration guide"
  url: __DISTRIBUTION_INTEGRATE_URL__
servers:
  - url: __SERVERS_ORIGIN__
    description: Replace with your deployment origin
paths:
  /api/v1/usage/reserve:
    post:
      operationId: reserveUsage
      summary: Reserve one verification or enforcement run (license preflight)
      description: >
        Called by the commercial CLI before contract verify, quick verify, or enforce.
        Requires Bearer API key. Body run_id must be idempotent per key.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveRequest"
      responses:
        "200":
          description: Allowed; quota consumed or duplicate run_id returned without double-charge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveAllowed"
        "400":
          description: Bad request (missing/invalid body, skewed issued_at)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
        "401":
          description: Invalid API key or key lifecycle denial (revoked, disabled, expired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
        "403":
          description: Quota exceeded or entitlement denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
        "503":
          description: Server error during reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
  /api/v1/commercial/plans:
    get:
      operationId: getCommercialPlans
      summary: Public commercial plan catalog (no secrets)
      responses:
        "200":
          description: Plan metadata for display and integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommercialPlansResponse"
        "503":
          description: Plans configuration unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/usage/current:
    get:
      operationId: getCurrentUsage
      summary: Current usage and quota status for authenticated API key principal
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current month usage and quota status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageCurrentV1"
        "401":
          description: Invalid API key or key lifecycle denial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Missing required scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Plans configuration unavailable or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/enforcement/baselines:
    post:
      operationId: createEnforcementBaseline
      summary: Create or replace accepted enforcement baseline for a workflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnforcementProjectionRequest"
      responses:
        "200":
          description: Baseline created or replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnforcementStateResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/enforcement/check:
    post:
      operationId: checkEnforcementDrift
      summary: Compare current run projection against accepted baseline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnforcementProjectionRequest"
      responses:
        "200":
          description: Comparison result (ok or drift)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnforcementCheckResponse"
        "409":
          description: Baseline not initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/enforcement/accept:
    post:
      operationId: acceptEnforcementDrift
      summary: Accept current projection as new baseline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnforcementProjectionRequest"
      responses:
        "200":
          description: Drift accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnforcementStateResponse"
  /api/v1/enforcement/history:
    get:
      operationId: getEnforcementHistory
      summary: Retrieve enforcement timeline for one workflow
      security:
        - bearerAuth: []
      parameters:
        - name: workflow_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnforcementHistoryResponse"
  /api/public/verification-reports:
    post:
      operationId: createPublicVerificationReport
      summary: Persist a shareable verification report (public ingestion; size-limited; optional env disable)
      tags:
        - PublicVerificationReports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicVerificationReportCreate"
      responses:
        "201":
          description: Report stored; URL is canonical origin + /r/{id}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicVerificationReportCreated"
        "400":
          description: Invalid JSON or failed schema validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "413":
          description: Request body exceeds maximum allowed size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Server error storing report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Public report ingestion disabled or server unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/funnel/verify-outcome:
    post:
      operationId: postVerifyOutcomeBeacon
      summary: Licensed verify-outcome beacon (idempotent per API key + run_id)
      description: >
        POST after a successful `POST /api/v1/usage/reserve` for the same `run_id`. Success is HTTP 204 with an empty body.
        Requires Bearer API key. Body schemaVersion must be 2.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOutcomeRequestV2"
      responses:
        "204":
          description: Beacon accepted (or duplicate ignored)
        "400":
          description: Invalid JSON or validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No reservation for this run_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "410":
          description: Reservation too old
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/funnel/trust-decision-blocked:
    post:
      operationId: postTrustDecisionBlocked
      summary: Record a blocked irreversible trust decision (idempotent per API key + fingerprint)
      description: >
        POST when an in-process gate blocks an irreversible action. Success is HTTP 204.
        Requires Bearer API key with report scope. Duplicate fingerprint returns 204 without a second funnel insert.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustDecisionRecordRequestV1"
      responses:
        "204":
          description: Record accepted or duplicate ignored
        "400":
          description: Invalid JSON or validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/oss/claim-ticket:
    post:
      operationId: postOssClaimTicket
      summary: Mint OSS claim ticket (CLI only; product activation headers required)
      description: >
        Creates or returns a handoff URL for linking a verification run to a web account.
        Requires `X-AgentSkeptic-Cli-Product` and `X-AgentSkeptic-Cli-Version` headers (see website/src/lib/funnelProductActivationConstants.ts).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OssClaimTicketRequest"
      responses:
        "200":
          description: Handoff URL returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OssClaimTicketHandoffResponse"
        "204":
          description: Ticket already claimed (idempotent)
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Forbidden (unsupported CLI client)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/oss/claim-redeem:
    post:
      operationId: postOssClaimRedeem
      summary: Redeem OSS claim ticket (browser session; optional claim_secret in body)
      description: Requires an authenticated session; prefers pending cookie from GET /verify/link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OssClaimRedeemRequest"
      responses:
        "200":
          description: Redeemed; returns run summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OssClaimRedeemOk"
        "400":
          description: Claim failed or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Already linked to another account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/oss/claim-continuation:
    post:
      operationId: postOssClaimContinuation
      summary: Record browser-open acknowledgement for interactive-human tickets (CLI only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OssClaimContinuationRequest"
      responses:
        "204":
          description: Recorded or already recorded
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: Not applicable or forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/oss/claim-handoff:
    get:
      operationId: getOssClaimHandoffLegacy
      summary: Legacy handoff redirect (308 to /verify/link)
      parameters:
        - name: h
          in: query
          required: true
          schema:
            type: string
      responses:
        "308":
          description: Redirect to /verify/link?h=…
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    EnforcementProjectionRequest:
      type: object
      required: [run_id, workflow_id, projection_hash, projection]
      properties:
        run_id:
          type: string
        workflow_id:
          type: string
        projection_hash:
          type: string
        projection:
          type: object
          additionalProperties: true
    EnforcementStateResponse:
      type: object
      required: [schema_version, status, workflow_id]
      properties:
        schema_version:
          type: integer
          const: 1
        status:
          type: string
        workflow_id:
          type: string
    EnforcementCheckResponse:
      allOf:
        - $ref: "#/components/schemas/EnforcementStateResponse"
        - type: object
          required: [expected_projection_hash, actual_projection_hash]
          properties:
            expected_projection_hash:
              type: string
            actual_projection_hash:
              type: string
    EnforcementHistoryResponse:
      type: object
      required: [schema_version, workflow_id, events]
      properties:
        schema_version:
          type: integer
          const: 1
        workflow_id:
          type: string
        events:
          type: array
          items:
            type: object
            additionalProperties: true
    ProblemDetails:
      type: object
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
    VerifyOutcomeRequestV2:
      type: object
      required:
        - schema_version
        - run_id
        - workflow_id
        - trust_decision
        - reason_codes
        - terminal_status
        - workload_class
        - subcommand
      properties:
        schema_version:
          type: integer
          const: 2
        run_id:
          type: string
          maxLength: 256
        workflow_id:
          type: string
          maxLength: 512
        trust_decision:
          type: string
          enum: [safe, unsafe, unknown]
        reason_codes:
          type: array
          maxItems: 8
          items:
            type: string
        terminal_status:
          type: string
          enum: [complete, inconsistent, incomplete]
        workload_class:
          type: string
          enum: [bundled_examples, non_bundled]
        subcommand:
          type: string
          enum: [batch_verify, quick_verify, verify_integrator_owned]
    TrustDecisionRecordRequestV1:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - trust_decision
        - gate_kind
        - routing
        - certificate_snapshot
        - human_blocker_lines
      properties:
        schema_version:
          type: integer
          const: 1
        trust_decision:
          type: string
          enum: [safe, unsafe, unknown]
        gate_kind:
          type: string
          enum: [contract_sql_irreversible, langgraph_checkpoint_terminal]
        routing:
          type: object
          additionalProperties: false
          required:
            - routing_key
          properties:
            routing_key:
              type: string
              maxLength: 512
            team:
              type: string
              maxLength: 256
            owner_slug:
              type: string
              maxLength: 256
        certificate_snapshot:
          $ref: "#/components/schemas/TrustCertificateSnapshotRequestV1"
        human_blocker_lines:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
    TrustCertificateSnapshotRequestV1:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - workflow_id
        - run_kind
        - state_relation
        - high_stakes_reliance
        - reason_codes
        - first_problem
      properties:
        schema_version:
          type: integer
          const: 1
        workflow_id:
          type: string
          maxLength: 512
        run_kind:
          type: string
          enum: [contract_sql, contract_sql_langgraph_checkpoint_trust, quick_preview]
        state_relation:
          type: string
          enum: [matches_expectations, does_not_match, not_established]
        high_stakes_reliance:
          type: string
          enum: [permitted, prohibited]
        reason_codes:
          type: array
          maxItems: 24
          items:
            type: string
        first_problem:
          nullable: true
          type: object
          additionalProperties: false
          required:
            - seq
            - tool_id
            - observed_trunc
            - expected_trunc
          properties:
            seq:
              type: integer
              minimum: 0
            tool_id:
              type: string
            observed_trunc:
              type: string
              maxLength: 512
            expected_trunc:
              type: string
              maxLength: 512
    OssClaimTicketRequest:
      type: object
      description: v1 or v2 OSS claim ticket wire shape (see website/src/lib/ossClaimTicketPayload.ts).
      additionalProperties: true
    OssClaimTicketHandoffResponse:
      type: object
      required: [schema_version, handoff_url]
      properties:
        schema_version:
          type: integer
          const: 2
        handoff_url:
          type: string
          format: uri
    OssClaimRedeemRequest:
      type: object
      properties:
        claim_secret:
          type: string
          pattern: "^[0-9a-f]{64}$"
      additionalProperties: true
    OssClaimRedeemOk:
      type: object
      required:
        - schema_version
        - run_id
        - terminal_status
        - workload_class
        - subcommand
        - build_profile
        - claimed_at
      properties:
        schema_version:
          type: integer
          const: 1
        run_id:
          type: string
        terminal_status:
          type: string
        workload_class:
          type: string
        subcommand:
          type: string
        build_profile:
          type: string
        claimed_at:
          type: string
          format: date-time
    OssClaimContinuationRequest:
      type: object
      required: [claim_secret]
      properties:
        claim_secret:
          type: string
          pattern: "^[0-9a-f]{64}$"
      additionalProperties: false
    PublicVerificationReportCreate:
      description: >
        POST accepts schemaVersion 2 only: { "schemaVersion": 2, "certificate": <OutcomeCertificateV1> } per
        schemas/public-verification-report-v2.schema.json. Legacy v1 envelopes are rejected with HTTP 400.
      type: object
      additionalProperties: true
    PublicVerificationReportCreated:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - id
        - url
      properties:
        schemaVersion:
          type: integer
          const: 2
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
          description: GET this URL to render the stored report (HTML)
    ReserveRequest:
      type: object
      required:
        - run_id
        - issued_at
      properties:
        run_id:
          type: string
          maxLength: 256
        issued_at:
          type: string
          format: date-time
          description: ISO8601; server rejects if skew from now exceeds 300 seconds
        intent:
          type: string
          enum: [verify, enforce]
          default: verify
          description: >
            enforce requires a paid plan (not Starter) with active subscription; verify is allowed
            for Starter (free included quota) and for paid plans with active subscription; overage
            is permitted past included for paid plans with allowOverage in plan catalog
    ReserveAllowed:
      type: object
      required:
        - allowed
        - plan
        - limit
        - used
        - included_monthly
        - overage_count
      properties:
        allowed:
          type: boolean
          enum: [true]
        plan:
          type: string
          enum: [starter, individual, team, business, enterprise]
        limit:
          type: integer
          description: Included verifications in the current billing month (not enterprise unlimited sentinel)
        used:
          type: integer
          description: Total verifications counted this month for this API key
        included_monthly:
          oneOf:
            - type: integer
            - type: "null"
          description: Same as limit for finite plans; null for enterprise unlimited
        overage_count:
          type: integer
          description: max(0, used - included_monthly) when the plan has a finite cap
    ReserveError:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
        - type: object
          required: [allowed, code, message]
          properties:
            allowed:
              type: boolean
              enum: [false]
            code:
              type: string
              description: >
                Examples BAD_REQUEST, INVALID_KEY, QUOTA_EXCEEDED, ENFORCEMENT_REQUIRES_PAID_PLAN,
                VERIFICATION_REQUIRES_SUBSCRIPTION, SUBSCRIPTION_INACTIVE, BILLING_PRICE_UNMAPPED,
                INSUFFICIENT_SCOPE, KEY_EXPIRED, KEY_REVOKED, KEY_DISABLED, SERVER_ERROR
            message:
              type: string
            upgrade_url:
              type: string
              format: uri
              description: Present for some 403 entitlement responses
    UsageCurrentV1:
      type: object
      required:
        - schema_version
        - plan
        - year_month
        - period_start_utc
        - period_end_utc
        - used_total
        - included_monthly
        - allow_overage
        - overage_count
        - quota_state
        - allowed_next
        - estimated_overage_usd
      properties:
        schema_version:
          type: integer
          const: 1
        plan:
          type: string
          enum: [starter, individual, team, business, enterprise]
        year_month:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}$"
        period_start_utc:
          type: string
          format: date-time
        period_end_utc:
          type: string
          format: date-time
        used_total:
          type: integer
          minimum: 0
        included_monthly:
          oneOf:
            - type: integer
            - type: "null"
        allow_overage:
          type: boolean
        overage_count:
          type: integer
          minimum: 0
        quota_state:
          type: string
          enum: [ok, notice, warning, in_overage, at_cap]
        allowed_next:
          type: boolean
        estimated_overage_usd:
          type: string
          example: "24.00"
    CommercialPlansResponse:
      type: object
      required:
        - schemaVersion
        - plans
      properties:
        schemaVersion:
          type: integer
        plans:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PublicPlan"
    PublicPlan:
      type: object
      properties:
        includedMonthly:
          oneOf:
            - type: integer
            - type: "null"
        monthlyUsdCents:
          oneOf:
            - type: integer
            - type: "null"
        yearlyUsdCents:
          oneOf:
            - type: integer
            - type: "null"
        displayPrice:
          type: string
        displayPriceYearly:
          oneOf:
            - type: string
            - type: "null"
        overageMicrousdPerVerification:
          oneOf:
            - type: integer
            - type: "null"
        allowOverage:
          type: boolean
        overageDisplayLabel:
          oneOf:
            - type: string
            - type: "null"
        marketingHeadline:
          type: string
        audience:
          type: string
        valueUnlock:
          type: string
