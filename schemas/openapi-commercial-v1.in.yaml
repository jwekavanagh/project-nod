openapi: "3.0.3"
info:
  title: Workflow Verifier commercial license API
  version: "1.0.0"
  contact:
    url: __DISTRIBUTION_CONTACT_URL__
  x-workflow-verifier-distribution:
    repository: __DISTRIBUTION_REPO_URL__
    npmPackage: __DISTRIBUTION_NPM_URL__
    openApi: __OPENAPI_SELF_URL__
  description: "__IDENTITY_ONE_LINER__\n\nMachine-readable contract for license preflight used by the published npm CLI.\nBase URL is your deployed app origin (same as NEXT_PUBLIC_APP_URL).\n"
externalDocs:
  description: "First-run integration guide"
  url: __DISTRIBUTION_INTEGRATE_URL__
servers:
  - url: __SERVERS_ORIGIN__
    description: Replace with your deployment origin
paths:
  /api/v1/usage/reserve:
    post:
      operationId: reserveUsage
      summary: Reserve one verification or enforcement run (license preflight)
      description: >
        Called by the commercial CLI before contract verify, quick verify, or enforce.
        Requires Bearer API key. Body run_id must be idempotent per key.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveRequest"
      responses:
        "200":
          description: Allowed; quota consumed or duplicate run_id returned without double-charge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveAllowed"
        "400":
          description: Bad request (missing/invalid body, skewed issued_at)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
        "401":
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
        "403":
          description: Quota exceeded or entitlement denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
        "503":
          description: Server error during reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveError"
  /api/v1/commercial/plans:
    get:
      operationId: getCommercialPlans
      summary: Public commercial plan catalog (no secrets)
      responses:
        "200":
          description: Plan metadata for display and integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommercialPlansResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
  schemas:
    ReserveRequest:
      type: object
      required:
        - run_id
        - issued_at
      properties:
        run_id:
          type: string
          maxLength: 256
        issued_at:
          type: string
          format: date-time
          description: ISO8601; server rejects if skew from now exceeds 300 seconds
        intent:
          type: string
          enum: [verify, enforce]
          default: verify
          description: enforce requires paid plan with active subscription; verify requires active subscription on individual/team/business/enterprise
    ReserveAllowed:
      type: object
      required:
        - allowed
        - plan
        - limit
        - used
      properties:
        allowed:
          type: boolean
          enum: [true]
        plan:
          type: string
          enum: [starter, individual, team, business, enterprise]
        limit:
          type: integer
        used:
          type: integer
    ReserveError:
      type: object
      properties:
        allowed:
          type: boolean
          enum: [false]
        code:
          type: string
          description: >
            Examples BAD_REQUEST, INVALID_KEY, QUOTA_EXCEEDED, VERIFICATION_REQUIRES_SUBSCRIPTION,
            ENFORCEMENT_REQUIRES_PAID_PLAN, SUBSCRIPTION_INACTIVE, SERVER_ERROR
        message:
          type: string
        upgrade_url:
          type: string
          format: uri
          description: Present for some 403 entitlement responses
    CommercialPlansResponse:
      type: object
      required:
        - schemaVersion
        - plans
      properties:
        schemaVersion:
          type: integer
        plans:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PublicPlan"
    PublicPlan:
      type: object
      properties:
        includedMonthly:
          oneOf:
            - type: integer
            - type: "null"
        monthlyUsdCents:
          oneOf:
            - type: integer
            - type: "null"
        displayPrice:
          type: string
        marketingHeadline:
          type: string
        audience:
          type: string
        valueUnlock:
          type: string
