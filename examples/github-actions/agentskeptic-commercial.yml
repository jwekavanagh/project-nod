# Example: run the published commercial AgentSkeptic CLI (npm package `agentskeptic`) against this repo's examples/
# with a real AGENTSKEPTIC_API_KEY and a reachable license API (COMMERCIAL_LICENSE_API_BASE_URL).
#
# Prerequisites:
# - GitHub secret AGENTSKEPTIC_API_KEY from your product account (legacy WORKFLOW_VERIFIER_API_KEY is still accepted by the CLI)
# - License server must accept POST /api/v1/usage/reserve for intent=enforce
#
# Copy to .github/workflows/ in a repo that vendors the same examples/ layout, or run from this monorepo.
#
# Optional integrator hardening (not required for this demo):
# - Vendor a pinned `execution-identity.v1.json` and gate CI with:
#     npx agentskeptic execution-identity verify --expect-json ./path/to/execution-identity.v1.json
# - Collect `artifacts/agentskeptic-receipts/*.json` after verify/enforce for audit (one receipt per run).
# See docs/verification-execution-ssot.md.
#
# Ambient discovery (job summary + failure PR comment): normative contract in docs/ambient-ci-distribution.md
name: AgentSkeptic (commercial CLI)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "examples/**"
  push:
    paths:
      - "examples/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AS_REPO_ROOT: ${{ github.workspace }}/node_modules/agentskeptic
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Create examples/demo.db from seed.sql
        run: |
          node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          import { DatabaseSync } from 'node:sqlite';
          const d = new DatabaseSync('examples/demo.db');
          d.exec(readFileSync('examples/seed.sql', 'utf8'));
          d.close();
          "

      - name: Install published agentskeptic (commercial)
        run: npm install agentskeptic@latest

      - name: Run stateful CI enforcement
        id: wfv_verify
        continue-on-error: true
        env:
          AGENTSKEPTIC_API_KEY: ${{ secrets.AGENTSKEPTIC_API_KEY }}
        run: |
          npx agentskeptic enforce --workflow-id wf_complete \
            --events examples/events.ndjson \
            --registry examples/tools.json \
            --db examples/demo.db \
            --create-baseline \
            > verify.stdout 2> verify.stderr

      - name: Append AgentSkeptic discovery summary
        if: always()
        run: |
          node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" summary >> "$GITHUB_STEP_SUMMARY"

      - name: Render PR comment body on verification failure
        if: github.event_name == 'pull_request' && steps.wfv_verify.outcome == 'failure'
        run: |
          node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" pr_body \
            --stderr-file verify.stderr \
            --workflow-stdout-file verify.stdout \
            > pr-comment-body.md

      - name: Upsert PR comment on verification failure
        if: github.event_name == 'pull_request' && steps.wfv_verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- agentskeptic-discovery:v1 -->';
            const body = fs.readFileSync('pr-comment-body.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const withMarker = comments.filter((c) => (c.body || '').includes(marker));
            const existing = withMarker.length ? withMarker[withMarker.length - 1] : null;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job when verification failed
        if: steps.wfv_verify.outcome == 'failure'
        run: |
          echo "::error::agentskeptic verify failed; see step logs and PR comment (if pull_request)."
          exit 1
