# AgentSkeptic commercial governance (opt-in): stateful `agentskeptic enforce` in CI.
# Prerequisites:
# - GitHub repository secret `AGENTSKEPTIC_API_KEY` from your AgentSkeptic product account.
# - Reachable commercial license API (`COMMERCIAL_LICENSE_API_BASE_URL` or default) that accepts
#   `POST /api/v1/usage/reserve` with `intent=enforce` under an active paid plan.
# Three jobs (see `jobs:` keys):
# - `governance_baseline` — manual dispatch to establish a baseline (`--create-baseline` once).
# - `governance_drift_pr` — pull-request steady check against the hosted baseline (no create/accept flags).
# - `governance_accept_dispatch` — manual dispatch to record drift acceptance; you must copy
#   `expected_projection_hash` and `lifecycle_state_version` from the drift job GitHub summary or
#   from composite outputs (`agentskeptic-governance-*`) into the workflow_dispatch form fields, and supply
#   governed acceptance audit fields (`acceptance_reason`, `acceptance_owner`; optional review-by and evidence links JSON).
# Ambient discovery (job summary): set `AS_REPO_ROOT` to `node_modules/agentskeptic` after install;
# see docs/ambient-ci-distribution.md for the composite visibility contract.
# This file triggers on `examples/**` changes; adjust paths when vendoring into another repo.
# Default branch baseline runs typically use `workflow_dispatch` → `governance_job=baseline`.
# PRs use steady enforce only; failing runs still get the discovery renderer on `if: always()`.
# PR comments (`pull-requests: write`) use `render-discovery-ci.mjs pr_body`, which embeds the
# discovery marker string in the generated Markdown (see the `github-script` step below).
# Integrators may pin `agentskeptic@<semver>` instead of `@latest` for reproducible gates.
# For OSS single-run verification without API keys, use examples/github-actions/agentskeptic-check.yml.
# Composite `agentskeptic-check` with `mode: enforce` is an alternate wiring; this example uses `npx` directly.
# Steady PR checks intentionally omit `--create-baseline` and `--accept-drift`; use dispatch jobs for those.
# After a drift failure, copy pins from the job summary or `agentskeptic-governance-*` outputs into the dispatch form.
# Rerun steady enforce on the default branch after a successful accept dispatch.

name: AgentSkeptic (commercial CLI)

on:
  workflow_dispatch:
    inputs:
      governance_job:
        type: choice
        options:
          - baseline
          - accept_drift
        required: true
        description: >-
          Run baseline creation once, or accept_drift after copying pin fields from a drift summary.
      expected_projection_hash:
        type: string
        required: false
        default: ""
      lifecycle_state_version:
        type: string
        required: false
        default: ""
      acceptance_reason:
        type: string
        required: false
        default: ""
        description: >-
          Required for accept_drift — operator justification (maps to AGENTSKEPTIC_ACCEPT_REASON).
      acceptance_owner:
        type: string
        required: false
        default: ""
        description: >-
          Required for accept_drift — owner identity / email (maps to AGENTSKEPTIC_ACCEPT_OWNER).
      acceptance_review_by:
        type: string
        required: false
        default: ""
        description: >-
          Optional ISO-8601 instant strictly in the future when dispatch runs (maps to AGENTSKEPTIC_ACCEPT_REVIEW_BY).
      acceptance_evidence_links_json:
        type: string
        required: false
        default: "[]"
        description: >-
          Optional JSON array of HTTPS URL strings (maps to AGENTSKEPTIC_ACCEPT_EVIDENCE_LINKS).
  pull_request:
    paths:
      - "examples/**"
  push:
    paths:
      - "examples/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  governance_baseline:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.governance_job == 'baseline'
    runs-on: ubuntu-latest
    env:
      AS_REPO_ROOT: ${{ github.workspace }}/node_modules/agentskeptic
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Create examples/demo.db from seed.sql
        run: |
          node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          import { DatabaseSync } from 'node:sqlite';
          const d = new DatabaseSync('examples/demo.db');
          d.exec(readFileSync('examples/seed.sql', 'utf8'));
          d.close();
          "

      - name: Install published agentskeptic (commercial)
        run: npm install agentskeptic@latest

      - name: Run stateful CI enforcement (create baseline)
        id: wfv_baseline
        continue-on-error: true
        env:
          AGENTSKEPTIC_API_KEY: ${{ secrets.AGENTSKEPTIC_API_KEY }}
        run: |
          npx agentskeptic enforce --workflow-id wf_complete \
            --events examples/events.ndjson \
            --registry examples/tools.json \
            --db examples/demo.db \
            --create-baseline \
            > verify.stdout 2> verify.stderr

      - name: Append AgentSkeptic discovery summary
        if: always()
        run: |
          node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" summary >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when enforcement failed
        if: steps.wfv_baseline.outcome == 'failure'
        run: |
          echo "::error::agentskeptic enforce (baseline) failed; see step logs."
          exit 1

  governance_drift_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      AS_REPO_ROOT: ${{ github.workspace }}/node_modules/agentskeptic
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Create examples/demo.db from seed.sql
        run: |
          node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          import { DatabaseSync } from 'node:sqlite';
          const d = new DatabaseSync('examples/demo.db');
          d.exec(readFileSync('examples/seed.sql', 'utf8'));
          d.close();
          "

      - name: Install published agentskeptic (commercial)
        run: npm install agentskeptic@latest

      - name: Run stateful CI enforcement (PR drift check)
        id: wfv_verify
        continue-on-error: true
        env:
          AGENTSKEPTIC_API_KEY: ${{ secrets.AGENTSKEPTIC_API_KEY }}
        run: |
          npx agentskeptic enforce --workflow-id wf_complete \
            --events examples/events.ndjson \
            --registry examples/tools.json \
            --db examples/demo.db \
            > verify.stdout 2> verify.stderr

      - name: Append AgentSkeptic discovery summary
        if: always()
        run: |
          node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" summary >> "$GITHUB_STEP_SUMMARY"

      - name: Render PR comment body on verification failure
        if: github.event_name == 'pull_request' && steps.wfv_verify.outcome == 'failure'
        run: |
          node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" pr_body \
            --stderr-file verify.stderr \
            --workflow-stdout-file verify.stdout \
            > pr-comment-body.md

      - name: Upsert PR comment on verification failure
        if: github.event_name == 'pull_request' && steps.wfv_verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- agentskeptic-discovery:v1 -->';
            const body = fs.readFileSync('pr-comment-body.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const withMarker = comments.filter((c) => (c.body || '').includes(marker));
            const existing = withMarker.length ? withMarker[withMarker.length - 1] : null;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job when verification failed
        if: steps.wfv_verify.outcome == 'failure'
        run: |
          echo "::error::agentskeptic enforce failed; see step logs and PR comment (if pull_request)."
          exit 1

  governance_accept_dispatch:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.governance_job == 'accept_drift'
    runs-on: ubuntu-latest
    env:
      AS_REPO_ROOT: ${{ github.workspace }}/node_modules/agentskeptic
      AGENTSKEPTIC_ENFORCE_EXPECTED_PROJECTION_HASH: ${{ github.event.inputs.expected_projection_hash }}
      AGENTSKEPTIC_ENFORCE_LIFECYCLE_STATE_VERSION: ${{ github.event.inputs.lifecycle_state_version }}
      AGENTSKEPTIC_ACCEPT_REASON: ${{ github.event.inputs.acceptance_reason }}
      AGENTSKEPTIC_ACCEPT_OWNER: ${{ github.event.inputs.acceptance_owner }}
      AGENTSKEPTIC_ACCEPT_REVIEW_BY: ${{ github.event.inputs.acceptance_review_by }}
      AGENTSKEPTIC_ACCEPT_EVIDENCE_LINKS: ${{ github.event.inputs.acceptance_evidence_links_json }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Create examples/demo.db from seed.sql
        run: |
          node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          import { DatabaseSync } from 'node:sqlite';
          const d = new DatabaseSync('examples/demo.db');
          d.exec(readFileSync('examples/seed.sql', 'utf8'));
          d.close();
          "

      - name: Install published agentskeptic (commercial)
        run: npm install agentskeptic@latest

      - name: Run stateful CI enforcement (accept drift)
        id: wfv_accept
        continue-on-error: true
        env:
          AGENTSKEPTIC_API_KEY: ${{ secrets.AGENTSKEPTIC_API_KEY }}
        run: |
          npx agentskeptic enforce --workflow-id wf_complete \
            --events examples/events.ndjson \
            --registry examples/tools.json \
            --db examples/demo.db \
            --accept-drift \
            > verify.stdout 2> verify.stderr

      - name: Append AgentSkeptic discovery summary
        if: always()
        run: |
          node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" summary >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when enforcement failed
        if: steps.wfv_accept.outcome == 'failure'
        run: |
          echo "::error::agentskeptic enforce (accept) failed; see step logs."
          exit 1
