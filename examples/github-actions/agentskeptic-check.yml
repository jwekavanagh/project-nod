# Example: stateless truth check (OSS) via composite action — default `agentskeptic check`, no AGENTSKEPTIC_API_KEY.
#
# In this monorepo, use `./.github/actions/agentskeptic-check`. In another repo, pin the upstream action, e.g.:
#   uses: jwekavanagh/agentskeptic/.github/actions/agentskeptic-check@main
# (substitute fork/org and ref as needed — not GitHub Marketplace).
#
# This file is the canonical release-gate posture: Node 22 before node:sqlite, `--project` (conventional layout),
# one pinned `npm install --no-save`, and composite `package` matching that pin. Drift vs root package.json
# version is rejected by `scripts/assert-ci-release-gate-example.mjs` in `npm run verification:truth`.
#
# Transparent manual alternative: invoke `npx agentskeptic check …` inline (same CLI contract — Outcome Certificate on stdout,
# truth_check_verdict + release_critical_truth_check_verdict on stderr). Optional composite input:
# fail-on: critical_not_trusted_or_unknown — gates the job on the release-critical stderr line only when the CLI exits 0
# (see docs/ambient-ci-distribution.md). For opt-in commercial/stateful enforcement see agentskeptic-commercial.yml.
#
# Ambient CI distribution (job summary, structured outputs, downloadable
# `agentskeptic-outcome-certificate` artifact, and OSS-friendly permissions
# requirements) is documented in docs/ambient-ci-distribution.md.
#
# The composite action below uploads `outcome-certificate.json` automatically as
# a workflow artifact named `agentskeptic-outcome-certificate` (using
# actions/upload-artifact@v4 over ACTIONS_RUNTIME_TOKEN — no `actions: write`
# scope is required on GITHUB_TOKEN). For opt-in PR comments and additional
# stateful enforcement see examples/github-actions/agentskeptic-commercial.yml.
name: AgentSkeptic Truth Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  truth-check:
    name: AgentSkeptic Truth Check
    runs-on: ubuntu-latest
    env:
      AGENTSKEPTIC_TELEMETRY: "0"
      AGENTSKEPTIC_CI_PACKAGE: agentskeptic@8.0.0
      AS_REPO_ROOT: ${{ github.workspace }}/node_modules/agentskeptic
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        env:
          NODE_OPTIONS: "--disable-warning=DEP0040"
        with:
          node-version: "22"

      - name: Prepare conventional agentskeptic/ paths for project mode
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p agentskeptic
          cp examples/tools.json agentskeptic/tools.json
          cp examples/events.ndjson agentskeptic/events.ndjson

      - name: Create examples/demo.db from seed.sql
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module -e "
          import { readFileSync } from 'node:fs';
          import { DatabaseSync } from 'node:sqlite';
          const d = new DatabaseSync('examples/demo.db');
          d.exec(readFileSync('examples/seed.sql', 'utf8'));
          d.close();
          "

      - name: Install pinned AgentSkeptic once (verify + discovery renderer)
        shell: bash
        run: npm install --no-save "${AGENTSKEPTIC_CI_PACKAGE}"

      # Optional persisted report (stay OFF for default OSS CI): uncomment under `with:` only after reading
      # docs/shareable-verification-reports.md (HTTPS origin-only, POST body caps, privacy, feature flags — not supported with enforce).
      # Example only (do not commit enabled unless you intend hosted publish):
      #   share-report-origin: https://agentskeptic.com
      - uses: ./.github/actions/agentskeptic-check
        with:
          workflow-id: wf_complete
          project: .
          package: ${{ env.AGENTSKEPTIC_CI_PACKAGE }}
          db: examples/demo.db

      - name: Append AgentSkeptic discovery summary
        if: always()
        shell: bash
        run: node "${AS_REPO_ROOT}/scripts/render-discovery-ci.mjs" summary >> "$GITHUB_STEP_SUMMARY"
